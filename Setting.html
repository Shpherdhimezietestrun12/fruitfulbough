<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruitful Bough - Security Block</title>
    <link rel="icon" type="image/x-icon" href="./icons/FB-Stream.png">
</head>

<body>
    <style>
        body {
            background-color: #111111;
        }

            width: 340px;

        }
        
        .par-one-sh {

        .div-submit,

            top: 81%;
            left: 50%;

            position: absolute;

    <style>
        .loading-div-sh {
            top: 0;
            left: 0;
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.70);
            z-index: 50;
            display: none;
        }
        
        .load-container {
            width: 120px;
            height: 120px;
            top: 50%;
            left: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: transparent;
        }
        
        .load-seq {
            width: 49px;
            height: 49px;
            top: 50%;
            left: 50%;
            position: relative;
            transform: translate(-50%, -50%);
            background-color: transparent;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid transparent;
            animation: drawBox 3s linear infinite;
        }
        /* Animation draws from 0 to 100% in building  */
        
        @keyframes drawBox {
            0% {
                border-top-color: transparent;
                border-right-color: transparent;
                border-bottom-color: transparent;
                border-left-color: transparent;
            }
            25% {
                border-top-color: orange;
                border-right-color: transparent;
                border-bottom-color: transparent;
                border-left-color: transparent;
            }
            50% {
                border-top-color: orange;
                border-right-color: orange;
                border-bottom-color: transparent;
                border-left-color: transparent;
            }
            75% {
                border-top-color: orange;
                border-right-color: orange;
                border-bottom-color: orange;
                border-left-color: transparent;
            }
            100% {
                border-top-color: orange;
                border-right-color: orange;
                border-bottom-color: orange;
                border-left-color: orange;
            }
        }
        
        .img-presenting {
            zoom: 26%;
        }
        
        .div-load-par {
            width: 200px;
            height: 27px;
            background-color: transparent;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .server-com {
            font-size: 12px;
            color: rgb(223, 223, 223);
            font-family: "Cabri ", sans-serif;
        }
        /* optional blinking cursor effect */
        
        .sp-count-12::after {
            content: '';
            animation: blink 0.7s step-end infinite;
        }
        
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
        
        .ipt-year {
            width: 100px;
            height: 35px;
            background-color: #1a1a1a;
            position: absolute;
            top: 100px;
            left: 10px;
            text-align: center;
            color: white;
            border-radius: 10px;
            border: none;
        }
        
        .ipt-date {
            width: 100px;
            height: 35px;
            background-color: #1a1a1a;
            position: absolute;
            top: 100px;
            right: 10px;
            text-align: center;
            color: white;
            border-radius: 10px;
            border: none;
        }
        
        .ipt-year:focus,
        .ipt-date:focus {
            outline: none;
            border: 1px solid white;
        }
        
        .div-month {
            width: 95%;
            height: 35px;
            background-color: #1a1a1a;
            position: absolute;
            left: 50%;
            top: 180px;
            border: 1px solid rgb(59, 59, 59);
            border-radius: 10px;
            transform: translate(-50%, -50%);
        }
        
        .div-row-12 {
            width: 43px;
            height: 20px;
            background-color: #1a1a1a;
            position: absolute;
            top: 88px;
            font-size: 11px;
            color: rgb(255, 166, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Cabri ", sans-serif;
            left: 25px;
            border-radius: 10px;
            transition: top 0.15s ease;
        }
        
        .div-row-12.active {
            top: 78px;
            background-color: #0e0e0e;
            left: 20px;
            /* adjust this to wherever the label should float up to */
        }
        
        .div-row-13 {
            width: 43px;
            height: 20px;
            background-color: #1a1a1a;
            position: absolute;
            top: 88px;
            font-size: 11px;
            color: rgb(255, 166, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            font-family: "Cabri ", sans-serif;
            right: 60px;
        }
        
        .div-row-13.active {
            top: 78px;
            background-color: #0e0e0e;
            right: 65px;
            /* adjust this to wherever the label should float up to */
        }
        
        .div-row-14 {
            width: 43px;
            height: 20px;
            background-color: transparent;
            position: absolute;
            top: 152px;
            font-size: 11px;
            color: rgb(255, 166, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Cabri ", sans-serif;
            left: 25px;
        }
        
        .div-row-14.active {
            background-color: #0e0e0e;
            left: 20px;
            top: 141px;
            /* adjust this to wherever the label should float up to */
        }
        
        .par-uiuiu {
            position: relative;
            text-align: center;
            color: rgb(255, 166, 0);
            font-size: 12px;
            top: -5px;
            font-family: "Cabri ", sans-serif;
        }
        
        .div-month-container {
            width: 95%;
            height: 155px;
            background-color: #1a1a1a;
            position: absolute;
            left: 50%;
            display: none;
            z-index: 1;
            top: 276px;
            transform: translate(-50%, -50%);
            overflow-y: auto;
        }
        
        .div-month-container::-webkit-scrollbar {
            display: noe;
            /* hide scrollbar on Chrome, Safari, and Opera */
            width: 3px;
            /* width of the scrollbar */
            height: 100%;
            /* height of the scrollbar (for horizontal scrollbars) */
        }
        
        .div-month-container::-webkit-scrollbar {
            background-color: transparent;
            /* color of the track */
            border-radius: 10px;
        }
        
        .div-month-container::-webkit-scrollbar-thumb {
            background: #ffc800;
            /* color of the scrollbar thumb */
            border-radius: 10px;
        }
        
        .div-month-container::-webkit-scrollbar-thumb:hover {
            background: #ffc800;
            /* color of the scrollbar thumb on hover */
        }
        
        .month-list {
            list-style: none;
            margin: 0;
            padding: 0;
            width: 100%;
        }
        
        .month-list li {
            width: 100%;
            height: 35px;
            display: flex;
            border: 1px solid rgb(94, 93, 93);
            align-items: center;
            color: rgb(255, 166, 0);
            font-family: "Cabri ", sans-serif;
            font-size: 13px;
            padding: 8px;
            box-sizing: border-box;
        }
        
        .par-sh-shh {
            font-family: "Cabri ", sans-serif;
            font-size: 13px;
            color: rgb(143, 143, 143);
            position: absolute;
            left: 10px;
            top: -2px;
        }
    </style>
    <div class="loading-div-sh">
        <div class="load-container">
            <div class="load-seq">
                <img src="./icons/fb_logo-qqss.png" class="img-presenting"></div>
        </div>
        <div class="div-load-par">
        </div>
        <script>
            // Start server loop 
            document.addEventListener('DOMContentLoaded', () => {
                const el = document.querySelector('.sp-count-12');

                const message = "......."; // 

                const typeSpeed = 80; // ms per character while typing
                const pauseAfterTyping = 1300; // ms to pause once fully typed
                const pauseBeforeRestart = 700; // ms pause on empty before typing again

                let charIndex = 0;

                function typeLoop() {
                    if (charIndex <= message.length) {
                        el.textContent = message.slice(0, charIndex);
                        charIndex++;
                        setTimeout(typeLoop, typeSpeed);
                    } else {
                        // finished typing, pause, then clear and restart from the first character
                        setTimeout(() => {
                            el.textContent = '';
                            charIndex = 0;
                            setTimeout(typeLoop, pauseBeforeRestart);
                        }, pauseAfterTyping);
                    }
                }

                typeLoop();
            });
        </script>
    </div>
    <div class="main-container">
        <p class="par-one-sh">SET BIRTHDAY</p>
        <div class="inside-container">
            <p class="par-uiuiu">Help AI - cynthia manage your details</p>
            <div class="div-display-sh">
                <p class=""><span class="date-par">00</span> <span class="month-par">January</span> <span class="year-par">2026</span></p>
            </div>
            <input class="ipt-year" placeholder="2004" maxlength="4" inputmode="numeric">
            <input placeholder="17" class="ipt-date" maxlength="2" inputmode="numeric">
            <div class="div-month">
                <p class="par-sh-shh">December</p>
            </div>
            <div class="div-row-12">Year</div>
            <div class="div-row-13">Date</div>
            <div class="div-row-14">Month</div>
            <div class="div-month-container">
                <ul class="month-list">
                    <li>January</li>
                    <li>February</li>
                    <li>March</li>
                    <li>April</li>
                    <li>May</li>
                    <li>June</li>
                    <li>July</li>
                    <li>August</li>
                    <li>September</li>
                    <li>October</li>
                    <li>November</li>
                    <li>December</li>
                </ul>
            </div>
            <script>
                //
                document.addEventListener('DOMContentLoaded', () => {
                    const input = document.querySelector('.ipt-year');
                    const label = document.querySelector('.div-row-12');

                    if (!input || !label) return;

                    function activateLabel() {
                        label.classList.add('active');
                    }

                    function deactivateLabel() {
                        // only move the label back down if the input is empty
                        if (input.value.trim() === '') {
                            label.classList.remove('active');
                        }
                    }

                    input.addEventListener('click', activateLabel);
                    input.addEventListener('focus', activateLabel);
                    input.addEventListener('blur', deactivateLabel);
                });

                // this is for the div second sequence 
                document.addEventListener('DOMContentLoaded', () => {
                    const input = document.querySelector('.ipt-date');
                    const label = document.querySelector('.div-row-13');

                    if (!input || !label) return;

                    function activateLabel() {
                        label.classList.add('active');
                    }

                    function deactivateLabel() {
                        // only move the label back down if the input is empty
                        if (input.value.trim() === '') {
                            label.classList.remove('active');
                        }
                    }

                    input.addEventListener('click', activateLabel);
                    input.addEventListener('focus', activateLabel);
                    input.addEventListener('blur', deactivateLabel);
                });


                // this is for the div second sequence
                document.addEventListener('DOMContentLoaded', () => {
                    const trigger = document.querySelector('.div-month');
                    const label = document.querySelector('.div-row-14');
                    const labelsh = document.querySelector('.div-month-container');

                    if (!trigger || !label) return;

                    function activateLabel() {
                        label.classList.add('active');
                        if (labelsh) {
                            labelsh.style.display = 'block';
                        }
                    }

                    function deactivateLabel() {
                        // only move the label back down if the container has no content/selection
                        if (trigger.textContent.trim() === '') {
                            label.classList.remove('active');
                            if (labelsh) {
                                labelsh.style.display = 'none';
                            }
                        }
                    }

                    trigger.addEventListener('click', activateLabel);
                    trigger.addEventListener('mouseenter', activateLabel);
                    trigger.addEventListener('mouseleave', deactivateLabel);
                });
                document.addEventListener('DOMContentLoaded', () => {
                    const labelsh = document.querySelector('.month-list');
                    if (!labelsh) return;

                    labelsh.addEventListener('click', () => {
                        if (labelsh.style.display === 'none') {
                            labelsh.style.display = 'block';
                        }
                    });
                });
                document.addEventListener('DOMContentLoaded', () => {
                    const container = document.querySelector('.div-month-container');
                    const list = document.querySelector('.month-list');
                    const display = document.querySelector('.par-sh-shh');

                    if (!list || !display || !container) return;

                    list.addEventListener('click', (e) => {
                        const clickedMonth = e.target.closest('li');
                        if (!clickedMonth) return;

                        display.textContent = clickedMonth.textContent;
                        container.style.display = 'none';
                    });
                });
                document.addEventListener('DOMContentLoaded', () => {
                    const dateInput = document.querySelector('.ipt-date');
                    const yearInput = document.querySelector('.ipt-year');

                    const dateSpan = document.querySelector('.date-par');
                    const monthSpan = document.querySelector('.month-par');
                    const yearSpan = document.querySelector('.year-par');

                    const container = document.querySelector('.div-month-container');
                    const list = document.querySelector('.month-list');
                    const display = document.querySelector('.par-sh-shh');

                    // date input -> date-par
                    if (dateInput && dateSpan) {
                        dateInput.addEventListener('input', () => {
                            dateSpan.textContent = dateInput.value;
                        });
                    }

                    // year input -> year-par
                    if (yearInput && yearSpan) {
                        yearInput.addEventListener('input', () => {
                            yearSpan.textContent = yearInput.value;
                        });
                    }

                    // month list click -> par-sh-shh AND month-par, then hide dropdown
                    if (list && display && container) {
                        list.addEventListener('click', (e) => {
                            const clickedMonth = e.target.closest('li');
                            if (!clickedMonth) return;

                            display.textContent = clickedMonth.textContent;
                            if (monthSpan) {
                                monthSpan.textContent = clickedMonth.textContent;
                            }
                            container.style.display = 'none';
                        });
                    }
                });


                //
                document.addEventListener('DOMContentLoaded', () => {
                    const yearInput = document.querySelector('.ipt-year');
                    const dateInput = document.querySelector('.ipt-date');

                    if (yearInput) {
                        yearInput.addEventListener('input', () => {
                            // strip anything that isn't a digit
                            yearInput.value = yearInput.value.replace(/\D/g, '').slice(0, 4);
                        });
                    }

                    if (dateInput) {
                        dateInput.addEventListener('input', () => {
                            let digitsOnly = dateInput.value.replace(/\D/g, '').slice(0, 2);

                            // clamp to 31 max, but allow typing "3" before the second digit completes it to something like "35"
                            if (digitsOnly !== '' && parseInt(digitsOnly, 10) > 31) {
                                digitsOnly = '31';
                            }

                            dateInput.value = digitsOnly;
                        });
                    }
                });
            </script>
            <style>
                .div-submit:hover,
                .div-skip:hover {
                    background-color: rgb(59, 59, 59);
                }
                
                .div-submit:hover {
                    color: white;
                }
                
                .par-sh-21 {
                    color: red;
                    position: relative;
                    text-align: center;
                    top: 63%;
                    display: none;
                }
                
                .sp-count-down {
                    font-family: "Cabri ", sans-serif;
                }
            </style>
        </div>
        <p class="par-sh-21">Pls Select Birthday or Skip</p>
        <div class="div-submit ">SUBMIT</div>
        <div class="div-skip ">Skip <span class="sp-count-down">(<span class="par-count"></span>)</span>
        </div>
        <script>
            //
            document.addEventListener('DOMContentLoaded', () => {
                const countEl = document.querySelector('.par-count');
                const disappearEl = document.querySelector('.sp-count-down');
                const ChnCol = document.querySelector('.div-skip');
                const LoadSamp = document.querySelector('.loading-div-sh');
                if (!countEl) return;

                let count = parseInt(countEl.textContent, 40) || 40;

                const timer = setInterval(() => {
                    count -= 1;
                    countEl.textContent = count;

                    if (count <= 0) {
                        clearInterval(timer);
                        // countdown finished — hook whatever should happen next in here
                        if (disappearEl) {
                            disappearEl.style.display = 'none';
                            ChnCol.style.color = 'white';
                            // this skip buton is clicked 
                            ChnCol.addEventListener('click', () => {
                                if (LoadSamp) {
                                    // show loading 
                                    LoadSamp.style.display = 'block';
                                    setTimeout(() => {
                                        // after loading move to main page 
                                        window.location.replace('./FruitfulBough.html');
                                    }, 5000);
                                }

                            });
                        }
                    }
                }, 4000);
            });
        </script>
        <script>
            //
        </script>
        <script>
            //
        </script>

    </div>
</body>
